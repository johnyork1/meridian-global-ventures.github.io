name: Supabase keep-alive

# Supabase free-tier projects pause after 7 days of inactivity. This workflow
# issues a DB-backed REST query every ~3 days to reset the inactivity timer
# on the contact-form project (crgudubunywtlkbejzvc). The ANON key is the
# public key already shipped in script.js — it's safe to inline here.

on:
  schedule:
    - cron: '17 7 */3 * *'
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      SUPABASE_URL: https://crgudubunywtlkbejzvc.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNyZ3VkdWJ1bnl3dGxrYmVqenZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyOTQ1MzEsImV4cCI6MjA4Njg3MDUzMX0.g3OrE46yPVl7uLIlPB9eHc7SMeoEF55uzM0ImyaER1E
    steps:
      - name: Query prospects table (resets inactivity timer)
        run: |
          set -euo pipefail
          http=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/prospects?select=id&limit=1")
          echo "HTTP $http"
          echo "Body:"; cat /tmp/body; echo
          # 200 (rows or empty array) and 401/403 (RLS) both prove Postgres was hit.
          # 5xx / 000 (NXDOMAIN) means the project is paused or broken.
          if [ "$http" = "000" ] || [ "${http:0:1}" = "5" ]; then
            echo "::error::Supabase project appears paused or unreachable (HTTP $http)."
            exit 1
          fi
      - name: Ping edge function (HEAD, no side effects)
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" -X OPTIONS \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Origin: https://meridianglobalventures.com" \
            -H "Access-Control-Request-Method: POST" \
            "$SUPABASE_URL/functions/v1/contact-form"
